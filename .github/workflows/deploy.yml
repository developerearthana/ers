name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_TELEMETRY_DISABLED=1 \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/earthana:${{ github.sha }} \
            .

      - name: Push Docker image
        run: docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/earthana:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy earthana \
            --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/earthana:${{ github.sha }} \
            --region=europe-west1 \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=1Gi \
            --cpu=1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars="MONGODB_URI=${{ secrets.MONGODB_URI }},NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }},AUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }},NEXTAUTH_URL=https://earthana-497340875009.europe-west1.run.app,AUTH_URL=https://earthana-497340875009.europe-west1.run.app,NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1"
